events {}

http {
  server {
    listen 80;

    # ---- MLflow (embedded) ----
    location /mlflow/ {
      proxy_pass http://mlflow:5000/;

      # Preserve client info
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Critical for UI apps
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      # 🔥 Strip frame-blocking headers
      proxy_hide_header X-Frame-Options;
      proxy_hide_header Content-Security-Policy;

      # (Optional) Re-add permissive headers for embedding
      add_header X-Frame-Options "ALLOWALL";
      add_header Content-Security-Policy "frame-ancestors *";

      # If MLflow serves absolute paths, this helps with subpath routing
      sub_filter_types text/html;
      sub_filter_once off;
      sub_filter 'href="/' 'href="/mlflow/';
      sub_filter 'src="/'  'src="/mlflow/';
    }

    # ---- (Optional) Airflow ----
    location /airflow/ {
      proxy_pass http://airflow-apiserver:8080/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # ---- (Optional) Grafana ----
    location /grafana/ {
        proxy_pass http://grafana:3000;
    }
  }
}