global:
  scrape_interval:     15s
  evaluation_interval: 15s

# ── Alertmanager connection ──────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
            
rule_files:
  - "/etc/prometheus/rules/recording_rules.yml"
  - "/etc/prometheus/rules/alerting_rules.yml" 
 
scrape_configs:
  - job_name: streamlit_app
    static_configs:
      - targets: ["streamlit:8502"]
    metrics_path: /metrics
    scrape_interval: 15s
 
  - job_name: mlflow_serve
    static_configs:
      - targets: ["mlflow-serve:8001"]
    metrics_path: /metrics
    scrape_interval: 30s
 
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "node_exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          host: "local-machine"
 
