[pytest]
testpaths     = tests
addopts       = -v --tb=short
python_files  = test_*.py
python_classes= Test*
python_functions = test_*
 
markers =
    smoke: basic page-load and tab visibility checks (requires live app at :8501)
    ui: interaction tests — form inputs, file upload, button clicks (requires live app at :8501)
 
